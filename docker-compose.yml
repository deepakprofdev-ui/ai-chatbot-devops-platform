# ============================================
# Lap AI — Local Docker Compose
# Brings up backend + frontend together for
# full-stack testing before Jenkins/EKS deployment
# ============================================

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lapai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - lapai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lapai-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lapai-network

networks:
  lapai-network:
    driver: bridge