# ============================================
# Lap AI — nginx config
# SPA fallback routing + backend API proxy
# ============================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster delivery of JS/CSS bundles
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache hashed static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the backend container/service.
    # "backend" here is the service name — matches docker-compose service name,
    # and later will match the Kubernetes Service name too.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — any unmatched route serves index.html
    # so React Router (or your client-side routing) handles it
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html — always fetch the latest shell
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}